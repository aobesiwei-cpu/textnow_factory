name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.9', '3.10', '3.11' ]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: textnow_us
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 black

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --max-line-length=120 --statistics
      continue-on-error: true

    - name: Format check with black
      run: |
        black --check . 2>&1 || echo "Warning: Code formatting issues detected"
      continue-on-error: true

    - name: Create .env file
      run: |
        cat > .env << EOF
        DB_TYPE=sqlite
        SQLITE_PATH=./data/test_textnow_factory.db
        JWT_SECRET_KEY=test_secret_key_do_not_use_in_production
        JWT_EXPIRE_HOURS=24
        MAX_CONCURRENT_TASK=20
        REQUEST_TIMEOUT=15
        RETRY_TIMES=3
        POLL_INTERVAL_SEC=10
        PROXY_API_URL=
        PROXY_API_KEY=
        EOF

    - name: Initialize database
      run: |
        mkdir -p data
        python database/init_db.py

    - name: Run tests with pytest
      run: |
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=html 2>&1 || echo "No tests found"
      continue-on-error: true

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: matrix.python-version == '3.11'
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install pylint flake8 black isort

    - name: Run pylint
      run: |
        find . -name '*.py' -not -path './.venv/*' -not -path './venv/*' | xargs pylint --disable=all --enable=E,F 2>&1 || true

    - name: Run isort check
      run: |
        isort . --check-only --diff 2>&1 || echo "Import sorting issues detected"
      continue-on-error: true

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install security scanning tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Run bandit for security issues
      run: |
        bandit -r . -ll 2>&1 || true
      continue-on-error: true

    - name: Check dependencies for known vulnerabilities
      run: |
        pip install -r requirements.txt
        safety check 2>&1 || true
      continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [ test, lint ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install build twine

    - name: Build package
      run: |
        python -m build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: python-package-distributions
        path: dist/
        retention-days: 5
