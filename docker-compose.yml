  #     MYSQL_ROOT_PASSWORD: root
  #     MYSQL_DATABASE: textnow_us
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   restart: unless-stopped

volumes:
