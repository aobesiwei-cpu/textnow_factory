version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DB_TYPE=sqlite
      - SQLITE_PATH=/app/data/textnow_factory.db
      - JWT_SECRET_KEY=your-secret-key-change-in-production
      - FLASK_ENV=production
      - FLASK_DEBUG=0
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: MySQL service (uncomment if you need MySQL)
  # mysql:
  #   image: mysql:8.0
