services:
  - type: web
    name: textnow-factory
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python database/init_db.py || true
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: free
    envVars:
      - key: DB_TYPE
        value: sqlite
      - key: SQLITE_PATH
        value: /opt/render/project/src/data/textnow_factory.db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"