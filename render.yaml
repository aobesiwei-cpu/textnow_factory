services:
  - type: web
    name: textnow-factory
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python database/init_db.py
    startCommand: python app.py
    plan: free
    envVars:
      - key: DB_TYPE
        value: sqlite
      - key: SQLITE_PATH
        value: /tmp/textnow_factory.db
      - key: JWT_SECRET_KEY
        scope: secret
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
